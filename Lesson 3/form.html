<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTML</title>
</head>
<body>
    <form>
        <table>
        <label for="user">Nhap Username</label>
        <input type="text" id="user" placeholder="Enter your username" >
        <br><br>
        <!-- password-->
         <label for="password">Nhap Password</label>
         <input type="password" id="password" placeholder="Enter your password">
         <br><br>
         <label for="email">Nhap Email</label>
         <input type="email" id="email" placeholder="Enter your email">
         <br><br>
         <!-- Nhap tuoi  -->
         <label for="age">Nhap Tuoi</label>
         <input type="number" id="age" placeholder="Enter your age">
         <br><br>
         <label for="number">Nhap SDT</label>
         <input type="tel" id="number" placeholder="Enter your phone number">
         <br><br>
         <label for="gender">Nhap Gioi Tinh</label>
         <input type="radio" name="gt" id="male">
         <label for="male">Nam</label>
         <input type="radio" name="gt" id="female">
         <label for="female">Nu</label>
         <br><br>
         <label for="hobbies">So thich</label>
         <input type="checkbox" name="hobbies" id="reading">
         <label for="reading">Doc sach</label>
            <input type="checkbox" name="hobbies" id="traveling">
            <label for="traveling">Du lich</label>
            <input type="checkbox" name="hobbies" id="cooking">
            <label for="cooking">Nau an</label>
            <input type="checkbox" name="hobbies" id="sports">
            <label for="sports">The thao</label>
         <br><br>
         <label for="color">Chon mau</label>
         <input type="color" id="color">
         <br><br>
         <label for="date">Chon ngay</label>
            <input type="date" id="date">
            <br><br>
            <label for="time">Chon gio</label>
            <input type="time" id="time">
            <br><br>
         <label for="file">Chon file</label>
            <input type="file" id="file">
            <br><br>
            <!--Gioi thieu ban than-->
            <label for="message">Gioi thieu ban than</label>
            <textarea id="message" placeholder="Enter your message"></textarea>
            <br><br>
            <!-- Chon quoc gia-->
            <label for="country">Chon quoc gia</label>
            <select id="country">
                <option>Viet Nam</option>
                <option>My</option>
                <option>Nhat Ban</option>
                <option>Han Quoc</option>
                <option>Phap</option>
                <option>Duc</option>
                <option>Y</option>
                <option>Tay Ban Nha</option>
                <option>Trung Quoc</option>
                <option>Uc</option>
                <option>Canada</option>
                <option>Anh</option>
                <option>Nga</option>
                <option>Thai Lan</option>
                <option>Singapore</option>
                <option>Indonesia</option>
                <option>Malaysia</option>
                <option>Philippines</option>
                <option>New Zealand</option>
                <option>Brazil</option>
                <option>Argentina</option>
                <option>Chile</option>
                <option>Colombia</option>
                <option>Peru</option>
                <option>Venezuela</option>
                <option>Mexico</option>
                <option>Saudi Arabia</option>
                <option>United Arab Emirates</option>
                <option>Qatar</option>
                <option>Kuwait</option>
                <option>Oman</option>
                <option>Bahrain</option>
                <option>Jordan</option>
                <option>Lebanon</option>
                <option>Egypt</option>
                <option>South Africa</option>
                <option>Kenya</option>
                <option>Nigeria</option>
                <option>Ghana</option>
                <option>Morocco</option>
                <option>Algeria</option>
                <option>Tunisia</option>
                <option>Libya</option>
                <option>Sudan</option>
            </select>
            <br><br>
            <input type="Submit" value="Gui">
            <input type="reset" value="Reset">
        </table>
        </form>
    </body>
</html>
